<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Atestados Médicos</title>
    <!-- Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="header-titles">
                <h1>Painel de Atestados</h1>
                <p>Extração automatizada via Inteligência Artificial</p>
            </div>
            <div class="header-actions">
                <button id="refresh-btn" class="btn primary-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-refresh-ccw"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                    Sincronizar Dados
                </button>
            </div>
        </header>

        <main>
            <div class="stats-grid">
                <div class="stat-card glass-panel">
                    <div class="stat-icon purple-gradient">📋</div>
                    <div class="stat-content">
                        <h3>Atestados Processados</h3>
                        <p id="total-count" class="counter">0</p>
                    </div>
                </div>
            </div>

            <div class="data-section glass-panel">
                <div class="section-header">
                    <h2>Registros Extraídos</h2>
                    <div class="search-container">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="search-input" placeholder="Buscar paciente, CRM...">
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table id="data-table">
                        <thead>
                            <tr>
                                <th>Paciente</th>
                                <th>Médico</th>
                                <th>CRM</th>
                                <th>CRM Válido</th>
                                <th>Data Atendimento</th>

                                <th>CID-10</th>
                                <th>Afastamento</th>
                                <th>Auditoria</th>
                                <th>Origem</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- JS vai popular as tr aqui -->
                        </tbody>
                    </table>
                </div>
                
                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">📂</div>
                    <h3>Nenhum dado encontrado</h3>
                    <p>Execute o script Python extrator para analisar atestados.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Script App -->
    <script src="main.js"></script>
</body>
</html>
